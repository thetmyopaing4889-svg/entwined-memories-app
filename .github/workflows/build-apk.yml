name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Scaffold Flutter project (creates android/ if missing)
        run: flutter create --project-name entwined_memories --org com.entwinedmemories . --platforms android

      - name: Debug - Show generated android files
        run: |
          echo "=== android/build.gradle ==="
          cat android/build.gradle || echo "(not found)"
          echo ""
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle || echo "(not found)"
          echo ""
          echo "=== android/gradle/wrapper/gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties || echo "(not found)"

      - name: Patch Kotlin & Gradle versions (Python - handles both old and new Flutter templates)
        run: |
          python3 << 'EOF'
          import re, os

          TARGET_KOTLIN = '1.9.22'
          TARGET_GRADLE = 'https://services.gradle.org/distributions/gradle-8.6-all.zip'
          TARGET_AGP    = '8.3.0'

          def patch_file(path, patterns):
              if not os.path.exists(path):
                  print(f"  SKIP (not found): {path}")
                  return False
              with open(path, 'r') as f:
                  original = f.read()
              result = original
              for old_pat, new_str, label in patterns:
                  result, n = re.subn(old_pat, new_str, result)
                  print(f"  [{path}] {label}: {'PATCHED' if n else 'no match'}")
              if result != original:
                  with open(path, 'w') as f:
                      f.write(result)
              return True

          # Old-style build.gradle (Flutter < 3.19)
          patch_file('android/build.gradle', [
              (r"ext\.kotlin_version\s*=\s*['\"][\d.]+['\"]",
               f"ext.kotlin_version = '{TARGET_KOTLIN}'",
               'kotlin_version'),
              (r"com\.android\.tools\.build:gradle:[\d.]+",
               f"com.android.tools.build:gradle:{TARGET_AGP}",
               'AGP version'),
          ])

          # New-style settings.gradle (Flutter >= 3.19)
          patch_file('android/settings.gradle', [
              (r'(id\s+"org\.jetbrains\.kotlin\.android"\s+version\s+")[^"]+(")',
               rf'\g<1>{TARGET_KOTLIN}\g<2>',
               'kotlin plugin version'),
              (r'(id\s+"com\.android\.application"\s+version\s+")[^"]+(")',
               rf'\g<1>{TARGET_AGP}\g<2>',
               'AGP plugin version'),
              (r"(id\s+'org\.jetbrains\.kotlin\.android'\s+version\s+')[^']+(')",
               rf'\g<1>{TARGET_KOTLIN}\g<2>',
               'kotlin plugin version (single quotes)'),
              (r"(id\s+'com\.android\.application'\s+version\s+')[^']+(')",
               rf'\g<1>{TARGET_AGP}\g<2>',
               'AGP plugin version (single quotes)'),
          ])

          # Gradle wrapper
          patch_file('android/gradle/wrapper/gradle-wrapper.properties', [
              (r'distributionUrl=.*',
               f'distributionUrl={TARGET_GRADLE}',
               'gradle wrapper URL'),
          ])

          print("\nDone patching.")
          EOF

      - name: Debug - Show patched files
        run: |
          echo "=== PATCHED android/build.gradle ==="
          cat android/build.gradle || echo "(not found)"
          echo ""
          echo "=== PATCHED android/settings.gradle ==="
          cat android/settings.gradle || echo "(not found)"

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entwined-memories-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ APK built successfully!"
          ls -lh build/app/outputs/flutter-apk/
